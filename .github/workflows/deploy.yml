# Workflow de deploy do Kâmbio para GitHub Pages.
#
# - Dispara em pushes para `main` e permite execução manual.
# - Usa a API oficial de Pages (actions/deploy-pages), sem branch
#   gh-pages intermediária.
#
# Pré-requisito no repositório: Settings → Pages → "Source: GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões necessárias para o deploy oficial do Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes se houver vários pushes rápidos.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Usamos `npm install` (não `npm ci`) porque o package-lock.json
      # inclui binários nativos opcionais travados para a plataforma onde
      # as dependências foram instaladas (Windows, no caso). `npm install`
      # recalcula os optional deps para o SO corrente (Linux aqui),
      # resolvendo por exemplo:
      #   - @rollup/rollup-linux-x64-gnu
      #   - lightningcss-linux-x64-gnu
      #   - sharp-linux-x64
      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Ensure .nojekyll in dist
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
