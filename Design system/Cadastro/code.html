<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #323537;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-base text-body-base min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest/80 backdrop-blur-md text-on-surface border-b border-surface-variant flex items-center justify-between px-margin-mobile h-16 w-full z-50 fixed top-0 transition-colors duration-200">
<div class="flex items-center gap-sm">
<button class="text-on-surface hover:bg-surface-variant/50 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md text-on-surface">KwanzaProfit</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto pt-24 pb-32 px-margin-mobile max-w-2xl mx-auto w-full">
<!-- Header Section -->
<div class="mb-xl">
<h1 class="font-display-lg text-display-lg text-primary">Cadastrar Nova Venda</h1>
<p class="font-body-base text-body-base text-on-surface-variant mt-xs">Insira os detalhes da transação para registro.</p>
</div>
<!-- Registration Form Card -->
<form class="bg-surface-container/40 backdrop-blur-xl rounded-xl border border-surface-variant shadow-[0px_4px_24px_rgba(0,0,0,0.2)] p-lg flex flex-col gap-lg">
<!-- Customer Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="customer_name">Nome do Cliente</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">person</span>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-lg py-sm pr-md pl-[44px] font-body-base text-body-base text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="customer_name" placeholder="Ex: João Silva" type="text"/>
</div>
</div>
<!-- Currency -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="currency">Moeda</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">public</span>
<select class="w-full bg-surface-container-low border border-surface-variant rounded-lg py-sm pr-10 pl-[44px] font-body-base text-body-base text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="currency">
<option disabled="" selected="" value="">Selecione a moeda</option>
<option value="usd">Dólar Americano (USD)</option>
<option value="eur">Euro (EUR)</option>
<option value="gbp">Libra Esterlina (GBP)</option>
<option value="zar">Rand Sul-Africano (ZAR)</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Amount Sold -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="amount">Quantidade Vendida</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">payments</span>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-lg py-sm pr-md pl-[44px] font-data-mono text-data-mono text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="amount" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Profit -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="profit">Lucro Estimado (AOA)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline pointer-events-none">trending_up</span>
<input class="w-full bg-surface-container-low border border-surface-variant rounded-lg py-sm pr-md pl-[44px] font-data-mono text-data-mono text-primary placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="profit" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
</div>
<!-- Action Area -->
<div class="pt-md mt-sm border-t border-surface-variant">
<button class="w-full bg-gradient-to-r from-emerald-500 to-emerald-400 text-slate-900 font-label-caps text-label-caps py-md px-lg rounded-full shadow-[0px_8px_16px_rgba(16,185,129,0.3)] hover:from-emerald-400 hover:to-emerald-300 transition-all active:scale-[0.98] flex items-center justify-center gap-sm uppercase tracking-wider font-bold" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Salvar Registro
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface-container-lowest border-t border-surface-variant shadow-[0px_-4px_24px_rgba(0,0,0,0.2)] md:hidden">
<!-- Dashboard Item (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-variant/50 transition-all duration-150 rounded-xl">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-caps text-label-caps mt-1">Dashboard</span>
</button>
<!-- Register Item (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container/20 text-primary rounded-full px-6 py-2 transition-all duration-150 border border-primary/30">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-label-caps text-label-caps mt-1">Register</span>
</button>
<!-- History Item (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-variant/50 transition-all duration-150 rounded-xl">
<span class="material-symbols-outlined">history</span>
<span class="font-label-caps text-label-caps mt-1">History</span>
</button>
</nav>
</body></html>
